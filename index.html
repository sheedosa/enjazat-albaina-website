<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --grey: #AFABAB;
      --grey-dark: #9a9591;
      --ink: #2B2B2B;
      --ink-soft: #47433f;
      --head: 'Oswald', 'Tajawal', sans-serif;
      --body: 'IBM Plex Sans', 'Tajawal', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--grey);
      color: var(--ink);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      padding: 56px 24px 32px;
      max-width: 820px; margin: 0 auto;
    }

    .logo { height: 92px; width: auto; margin-bottom: 44px; }

    h1 {
      font-family: var(--head); font-weight: 700;
      font-size: clamp(56px, 12vw, 130px); line-height: .96;
      letter-spacing: .02em; text-transform: uppercase;
      margin: 0; color: var(--ink);
    }
    .ar-title {
      font-family: 'Janna LT', 'Tajawal', sans-serif; font-weight: 700;
      font-size: clamp(30px, 6vw, 56px); line-height: 1.4;
      margin: 22px 0 0; color: transparent;
      -webkit-text-stroke: 2px var(--ink);
      direction: rtl;
    }

    .lede {
      font-size: clamp(15px, 2.2vw, 18px); line-height: 1.75;
      color: var(--ink-soft); max-width: 520px;
      margin: 32px auto 6px;
    }
    .lede.ar { font-family: 'Janna LT', 'Tajawal', sans-serif; direction: rtl; }

    .rule { width: 64px; height: 2px; background: rgba(43, 43, 43, .32); margin: 42px auto 34px; }

    .contact {
      display: flex; flex-wrap: wrap; gap: 14px 16px;
      align-items: center; justify-content: center;
    }
    .contact a, .contact span {
      display: inline-flex; align-items: center; gap: 9px;
      color: var(--ink); text-decoration: none;
      font-size: 15px; font-weight: 500;
      padding: 11px 18px; border: 1px solid rgba(43, 43, 43, .32);
      border-radius: 999px; transition: background .18s, border-color .18s;
    }
    .contact a:hover { background: rgba(43, 43, 43, .1); border-color: rgba(43, 43, 43, .55); }
    .contact svg { width: 17px; height: 17px; flex: none; }

    .foot {
      position: relative; z-index: 1;
      text-align: center; padding: 20px 24px 26px;
      font-size: 12.5px; color: rgba(43, 43, 43, .58);
      font-family: var(--head); letter-spacing: .12em; text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .logo { height: 68px; margin-bottom: 32px; }
      .contact a, .contact span { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="assets/enjazat-logo-charcoal.png" alt="Enjazat Albaina">

    <h1>Coming Soon</h1>
    <div class="ar-title" lang="ar">قريباً</div>

    <p class="lede">Our new website is on the way. Get in touch with us anytime using the details below.</p>
    <p class="lede ar" lang="ar">موقعنا الجديد قادم قريباً. تواصلوا معنا في أي وقت عبر البيانات التالية.</p>

    <div class="rule" aria-hidden="true"></div>

    <nav class="contact" aria-label="Contact">
      <a href="mailto:info@enjazatalbaina.ly">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        info@enjazatalbaina.ly
      </a>
      <a href="tel:+218920096661" dir="ltr">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg>
        092 009 6661
      </a>
      <span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        Alfuwayhat, Benghazi, Libya
      </span>
    </nav>
  </main>

  <div class="foot">Enjazat Albaina</div>
</body>
</html>
